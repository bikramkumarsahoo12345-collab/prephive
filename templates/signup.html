<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - PrepHive</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: #0f172a;
    color: white;
}

nav h2 {
    color: #38bdf8;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

/* Body */
body {
    background: #f4f4f4;
}

/* Wrapper (FIXED) */
.wrapper {
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
}

/* Container */
.signup-container {
    width: 900px;
    display: flex;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-height: 85vh;
}

/* LEFT */
.left {
    width: 50%;
    padding: 30px;
    overflow-y: auto;
    max-height: 80vh;
}

/* Scrollbar (optional premium) */
.left::-webkit-scrollbar {
    width: 6px;
}
.left::-webkit-scrollbar-thumb {
    background: #38bdf8;
    border-radius: 5px;
}

.left h2 {
    margin-bottom: 10px;
}

.left p {
    color: gray;
    margin-bottom: 15px;
}

/* Form Box */
.form-box {
    background: #eef2ff;
    padding: 20px;
    border-radius: 10px;
}

/* Form */
.signup-form label {
    font-size: 14px;
    display: block;
    margin-top: 8px;
}

.signup-form input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

.signup-form input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 5px rgba(56,189,248,0.4);
}

/* Button */
.signup-btn {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.signup-btn:hover {
    background: #0ea5e9;
}

/* RIGHT */
.right {
    width: 50%;
}

.right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Login link */
.login-link {
    margin-top: 10px;
    font-size: 14px;
}

.error-message {
    margin-top: 15px;
    color: #b91c1c;
    font-weight: bold;
}

.success-message {
    margin-top: 15px;
    color: #047857;
    font-weight: bold;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <h2>PrepHive</h2>
    <ul>
        <li><a href="/1.html">Home</a></li>
        <li><a href="/1.html#about">About us</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li><a href="/admin/login" style="color: #fbbf24; font-weight: bold;">Admin</a></li>
    </ul>
</nav>

<!-- Signup Section -->
<div class="wrapper">

    <div class="signup-container">

        <!-- LEFT -->
        <div class="left">
            <h2>Create Account</h2>
            <p>Sign up to get started</p>

            <div class="form-box">

                <form class="signup-form" method="post" action="/signup.html">

                    <label>Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your name" required>

                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" required>

                    <label>Mobile Number</label>
                    <input type="text" name="mobile" placeholder="Enter mobile number" required>

                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create password" required>

                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm password" required>

                    <button type="submit" class="signup-btn">Sign Up</button>

                </form>
                {% if error %}
                <p class="error-message">{{ error }}</p>
                {% endif %}
                {% if message %}
                <p class="success-message">{{ message }}</p>
                {% endif %}

            </div>

            <p class="login-link">
                Already have an account? <a href="/login.html">Login</a>
            </p>

        </div>

        <!-- RIGHT -->
        <div class="right">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
        </div>

    </div>

</div>

</body>
</html>
