<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - PrepHive</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}
body {
    background: #f4f4f4;
}
header {
    background: #0f172a;
    padding: 20px 40px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
header h1 {
    font-size: 24px;
}
header a {
    color: #38bdf8;
    text-decoration: none;
    background: white;
    padding: 10px 16px;
    border-radius: 8px;
}
main {
    padding: 40px;
}
.actions {
    margin-bottom: 20px;
}
.actions a {
    display: inline-block;
    background: #38bdf8;
    color: black;
    padding: 12px 18px;
    border-radius: 8px;
    text-decoration: none;
    margin-right: 10px;
}
.table-wrap {
    overflow-x: auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 16px;
    text-align: left;
    border-bottom: 1px solid #e5e7eb;
}
th {
    background: #eef2ff;
}
</style>
</head>
<body>
<header>
    <h1>Admin Dashboard</h1>
    <a href="/logout">Logout</a>
</header>
<main>
    <div class="actions">
        <a href="/admin/upload">Upload New Paper</a>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Subject</th>
                    <th>Semester</th>
                    <th>Department</th>
                    <th>Year</th>
                    <th>Uploaded</th>
                </tr>
            </thead>
            <tbody>
                {% for paper in papers %}
                <tr>
                    <td>{{ paper.title }}</td>
                    <td>{{ paper.subject }}</td>
                    <td>{{ paper.semester }}</td>
                    <td>{{ paper.department }}</td>
                    <td>{{ paper.year }}</td>
                    <td>{{ paper.filename }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6">No papers uploaded yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
