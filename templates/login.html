<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PrepHive</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: #0f172a;
    color: white;
}

nav h2 {
    color: #38bdf8;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

/* Body */
body {
    background: #f4f4f4;
}

/* Wrapper */
.wrapper {
    height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Login Box */
.login-container {
    width: 900px;
    display: flex;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* LEFT */
.left {
    width: 50%;
    padding: 40px;
}

.left h2 {
    margin-bottom: 10px;
}

.left p {
    color: gray;
    margin-bottom: 20px;
}

/* Social Box (Now Form Box) */
.social-box {
    background: #eef2ff;
    padding: 20px;
    border-radius: 10px;
}

/* Form */
.login-form label {
    font-size: 14px;
    display: block;
    margin-top: 10px;
}

.login-form input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

.login-form input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 5px rgba(56,189,248,0.4);
}

/* Button */
.login-btn {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #0ea5e9;
}

/* RIGHT */
.right {
    width: 50%;
}

.right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.error-message {
    margin-top: 15px;
    color: #b91c1c;
    font-weight: bold;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <h2>PrepHive</h2>
    <ul>
        <li><a href="/1.html">Home</a></li>
        <li><a href="/1.html#about">About us</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <li><a href="/admin/login" style="color: #fbbf24; font-weight: bold;">Admin</a></li>
    </ul>
</nav>

<!-- Login Section -->
<div class="wrapper">

    <div class="login-container">

        <!-- LEFT -->
        <div class="left">
            <h2>Welcome to PrepHive</h2>
            <p>Login to your account</p>

            <!-- FORM INSIDE BOX -->
            <div class="social-box">

                <form class="login-form" method="post" action="/login.html">

                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>

                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>

                    <button type="submit" class="login-btn">Login</button>
                </form>
                {% if error %}
                <p class="error-message">{{ error }}</p>
                {% endif %}

            </div>

        </div>

        <!-- RIGHT -->
        <div class="right">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
        </div>

    </div>

</div>

</body>
</html>
