<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - PrepHive</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f4f4f4;
}

.wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.admin-box {
    width: 420px;
    background: white;
    border-radius: 15px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.admin-box h2 {
    margin-bottom: 20px;
}

.admin-box label {
    display: block;
    margin-top: 15px;
    font-size: 14px;
}

.admin-box input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.admin-box button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.admin-box button:hover {
    background: #0ea5e9;
}

.error-message {
    margin-top: 15px;
    color: #b91c1c;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="admin-box">
        <h2>Admin Login</h2>
        <form method="post" action="/admin/login">
            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Sign In</button>
        </form>
        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
    </div>
</div>
</body>
</html>
