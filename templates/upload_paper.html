<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Paper - PrepHive Admin</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}
body {
    background: #f4f4f4;
}
header {
    background: #0f172a;
    padding: 20px 40px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
header h1 {
    font-size: 24px;
}
header a {
    color: #38bdf8;
    text-decoration: none;
    background: white;
    padding: 10px 16px;
    border-radius: 8px;
}
main {
    padding: 40px;
}
.form-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 700px;
    margin: auto;
}
.form-card label {
    display: block;
    margin-top: 18px;
    font-size: 14px;
}
.form-card input,
.form-card select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.form-card button {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}
.form-card button:hover {
    background: #0ea5e9;
}
.success-message {
    margin-top: 15px;
    color: #047857;
    font-weight: bold;
}
.error-message {
    margin-top: 15px;
    color: #b91c1c;
    font-weight: bold;
}
</style>
</head>
<body>
<header>
    <h1>Upload Question Paper</h1>
    <a href="/admin/dashboard">Back to Dashboard</a>
</header>
<main>
    <div class="form-card">
        <form method="post" action="/admin/upload" enctype="multipart/form-data">
            <label>Title</label>
            <input type="text" name="title" required>

            <label>Subject</label>
            <input type="text" name="subject" required>

            <label>Semester</label>
            <input type="text" name="semester" required>

            <label>Department</label>
            <input type="text" name="department" required>

            <label>Year</label>
            <input type="text" name="year" required>

            <label>Upload PDF</label>
            <input type="file" name="pdf_file" accept="application/pdf" required>

            <button type="submit">Upload Paper</button>
        </form>
        {% if message %}
        <p class="success-message">{{ message }}</p>
        {% endif %}
        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
    </div>
</main>
</body>
</html>
